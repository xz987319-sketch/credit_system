{% load static %}
{% url 'apply:home' as home_url %}
<!DOCTYPE html> {# H5 成功页面 #}
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>提交成功</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'app.css' %}" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="text-center">
        <div class="mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="success" class="bi bi-check-circle-fill">
                <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
            </svg>
        </div>
        <h1 class="h4 text-success mb-3">提交成功</h1>
        <p class="fs-5">您的申请编号为：<strong>#{{ application.id }}</strong></p>
        <p class="text-muted small">请保存编号以便后续查询</p>
    </div>

    <div class="d-grid gap-2 mt-4">
        <button type="button" class="btn btn-primary btn-lg" onclick="closeWindow()">关闭</button>
    </div>
</div>

<script>
    function closeWindow() {
        // 尝试关闭当前窗口/标签页
        try {
            // 在微信等APP中，可能需要跳转到其他页面
            if (WeixinJSBridge) {
                WeixinJSBridge.call('closeWindow');
            } else if (navigator.userAgent.indexOf('MicroMessenger') > -1) {
                // 微信环境
                WeixinJSBridge.call('closeWindow');
            } else {
                window.close();
            }
        } catch (e) {
            // 如果无法关闭，则尝试跳转到首页
            window.location.href = "{{ home_url }}";
        }
    }
</script>
</body>
</html>
