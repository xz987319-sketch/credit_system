{% load static %}
{% url 'apply:bank_hall' as bank_hall_url %}
<!DOCTYPE html> {# H5 成功页面 #}
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>提交成功</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'app.css' %}" rel="stylesheet">
    <style>
        .success-icon { color: #28a745; }
        .countdown-badge {
            display: inline-block;
            background: #f0faf3;
            color: #28a745;
            border: 1px solid #b7ebc4;
            border-radius: 20px;
            padding: 4px 16px;
            font-size: 14px;
            margin-top: 8px;
        }
    </style>
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="text-center">
        <div class="mb-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="72" height="72" fill="currentColor" class="bi bi-check-circle-fill success-icon" viewBox="0 0 16 16">
                <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
            </svg>
        </div>
        <h1 class="h4 text-success mb-2">提交成功</h1>
        <p class="fs-5 mb-1">您的申请编号为：<strong>#{{ application.id }}</strong></p>
        <p class="text-muted small mb-3">请保存编号以便后续查询</p>
        <div class="countdown-badge">
            <span id="countdown-seconds">5</span> 秒后自动返回银行大厅
        </div>
    </div>

    <div class="d-grid gap-2 mt-4">
        <a href="{{ bank_hall_url }}" class="btn btn-primary btn-lg" id="btn-back-hall">立即返回银行大厅</a>
    </div>
</div>

<script>
    // ===== 清理表单提交标记 =====
    // 成功页进入时清理标记，防止下次进入申请页被错误拦截
    var SUBMITTED_KEY = 'form_submitted_h5_{{ application.card_product.id|default:"0" }}';
    sessionStorage.removeItem(SUBMITTED_KEY);

    // ===== 设备检测+动态URL：手机→H5银行大厅，电脑→PC端卡种列表 =====
    // 直接用浏览器当前地址，包含端口，最可靠（不受服务端代理影响）
    var currentHost = window.location.host;
    var isMobile = /iPhone|iPad|iPod|Android|Mobile/i.test(navigator.userAgent);
    var targetUrl = isMobile
        ? 'http://' + currentHost + '/apply/'
        : 'http://' + currentHost + '/loan/products/';

    // ===== 禁止返回到申请表单（防止重复提交）=====
    history.replaceState({page: 'success'}, '', location.href);
    history.pushState({page: 'success_guard'}, '', location.href);
    window.addEventListener('popstate', function(e) {
        sessionStorage.removeItem(SUBMITTED_KEY);
        window.location.replace(targetUrl);
    });

    // ===== 5秒倒计时自动跳转 =====
    var seconds = 5;
    var countdownEl = document.getElementById('countdown-seconds');
    var btnBackHall = document.getElementById('btn-back-hall');

    var timer = setInterval(function() {
        seconds--;
        if (seconds <= 0) {
            clearInterval(timer);
            window.location.replace(targetUrl);
        } else {
            countdownEl.textContent = seconds;
        }
    }, 1000);

    // 点击按钮立即跳转，取消倒计时
    btnBackHall.addEventListener('click', function(e) {
        e.preventDefault();
        clearInterval(timer);
        window.location.replace(targetUrl);
    });
</script>
</body>
</html>
