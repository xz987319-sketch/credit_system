{% load static %}
<!DOCTYPE html> {# PC端成功页面 #}
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>提交成功</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'app.css' %}" rel="stylesheet">
    <style>
        .success-container {
            max-width: 500px;
            margin: 80px auto;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
        }
        .success-icon {
            width: 80px;
            height: 80px;
            margin-bottom: 24px;
        }
        .application-id {
            font-size: 1.5rem;
            font-weight: 600;
            color: #0d6efd;
            margin: 16px 0;
        }
        .countdown-text {
            color: #6c757d;
            margin-top: 16px;
        }
    </style>
</head>
<body>
<div class="success-container">
    {# 成功图标 #}
    <svg class="success-icon text-success" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 16 16">
        <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
    </svg>

    <h1 class="h3 text-success mb-3">提交成功</h1>
    <p class="text-muted">您的申请编号为：</p>
    <div class="application-id">#{{ application.id }}</div>
    <p class="text-muted small">请保存编号以便后续查询，演示流程将进入银行初审队列。</p>

    <div class="d-grid gap-2 mt-4">
        <a href="{% url 'apply:home' %}" class="btn btn-primary btn-lg" id="btn-back-home">返回首页</a>
    </div>

    <p class="countdown-text mt-3" id="countdown-text">
        <span id="countdown-seconds">5</span> 秒后自动返回首页
    </p>
</div>

<script>
    let seconds = 5;
    const countdownEl = document.getElementById('countdown-seconds');
    const btnBackHome = document.getElementById('btn-back-home');
    const countdownText = document.getElementById('countdown-text');

    const timer = setInterval(function() {
        seconds--;
        if (seconds <= 0) {
            clearInterval(timer);
            window.location.href = "{% url 'apply:home' %}";
        } else {
            countdownEl.textContent = seconds;
        }
    }, 1000);

    btnBackHome.addEventListener('click', function() {
        clearInterval(timer);
    });
</script>
</body>
</html>
